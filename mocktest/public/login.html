<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login / Register — MockTest Pro</title>
    <meta name="description" content="Login or create an account to access mock tests and track your performance."/>
    <link rel="stylesheet" href="css/style.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        .auth-page {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 24px; position: relative; z-index: 1;
        }
        .auth-wrap {
            display: grid; grid-template-columns: 1fr 1fr;
            width: 100%; max-width: 920px;
            background: rgba(15,16,36,0.9);
            border: 1px solid var(--border); border-radius: var(--radius-xl);
            overflow: hidden; backdrop-filter: blur(20px);
        }
        .auth-left {
            background: linear-gradient(145deg, rgba(99,102,241,0.25), rgba(139,92,246,0.15));
            padding: 48px 40px; display: flex; flex-direction: column;
            justify-content: center; border-right: 1px solid var(--border);
        }
        .auth-right { padding: 48px 40px; }
        .auth-feature { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .auth-feature-icon { width: 36px; height: 36px; border-radius: 9px; background: rgba(99,102,241,0.2); display: flex; align-items: center; justify-content: center; color: var(--accent-light); flex-shrink:0; }
        @media(max-width:680px) {
            .auth-wrap { grid-template-columns: 1fr; }
            .auth-left { display: none; }
        }
        .tab-switch { display: flex; gap: 0; margin-bottom: 28px; background: var(--bg-card); border-radius: var(--radius); overflow: hidden; }
        .tab-switch-btn { flex:1; padding: 11px; font-size: 0.9rem; font-weight: 600; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; transition: var(--transition); }
        .tab-switch-btn.active { background: var(--accent); color: white; }
        .input-icon-wrap { position: relative; }
        .input-icon-wrap .bi { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .input-icon-wrap .form-control { padding-left: 40px; }
        .pw-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); cursor: pointer; background: none; border: none; }
    </style>
</head>
<body>
<div class="bg-mesh"></div>

<div class="auth-page">
    <div class="auth-wrap">
        <!-- LEFT PANEL -->
        <div class="auth-left">
            <a href="index.html" class="navbar-brand" style="margin-bottom:36px">
                <div class="brand-logo"><i class="bi bi-mortarboard-fill"></i></div>
                MockTest<span style="color:var(--accent-light)">Pro</span>
            </a>
            <h2 style="font-family:var(--font-display);font-size:1.6rem;font-weight:800;margin-bottom:12px;line-height:1.3">Your Exam Success<br/>Starts Here</h2>
            <p class="text-muted text-sm" style="margin-bottom:36px;line-height:1.7">Prepare smarter with AI-powered mock tests designed to simulate the real exam experience.</p>
            <div class="auth-feature">
                <div class="auth-feature-icon"><i class="bi bi-clock-fill"></i></div>
                <div>
                    <div style="font-weight:600;font-size:0.9rem">Real Exam Conditions</div>
                    <div class="text-xs text-muted">Countdown timer, auto-submit on expiry</div>
                </div>
            </div>
            <div class="auth-feature">
                <div class="auth-feature-icon"><i class="bi bi-bar-chart-fill"></i></div>
                <div>
                    <div style="font-weight:600;font-size:0.9rem">Instant Analytics</div>
                    <div class="text-xs text-muted">Score, percentage & detailed review</div>
                </div>
            </div>
            <div class="auth-feature">
                <div class="auth-feature-icon"><i class="bi bi-trophy-fill"></i></div>
                <div>
                    <div style="font-weight:600;font-size:0.9rem">Compete & Rank</div>
                    <div class="text-xs text-muted">Live leaderboard for every exam</div>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="auth-right">
            <div class="tab-switch" id="tabSwitch">
                <button class="tab-switch-btn active" id="loginTab" onclick="switchTab('login')">Login</button>
                <button class="tab-switch-btn" id="registerTab" onclick="switchTab('register')">Register</button>
            </div>

            <!-- LOGIN FORM -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-icon-wrap">
                        <i class="bi bi-envelope-fill"></i>
                        <input type="email" id="loginEmail" class="form-control" placeholder="you@email.com" required/>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-icon-wrap" style="position:relative">
                        <i class="bi bi-lock-fill"></i>
                        <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required/>
                        <button type="button" class="pw-toggle" onclick="togglePw('loginPassword',this)"><i class="bi bi-eye-fill"></i></button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-full" id="loginBtn" style="margin-top:4px">
                    <i class="bi bi-box-arrow-in-right"></i> Login
                </button>
            </form>

            <!-- REGISTER FORM -->
            <form id="registerForm" class="hidden" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <div class="input-icon-wrap">
                        <i class="bi bi-person-fill"></i>
                        <input type="text" id="regName" class="form-control" placeholder="Name" required/>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-icon-wrap">
                        <i class="bi bi-envelope-fill"></i>
                        <input type="email" id="regEmail" class="form-control" placeholder="you@email.com" required/>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-icon-wrap" style="position:relative">
                        <i class="bi bi-lock-fill"></i>
                        <input type="password" id="regPassword" class="form-control" placeholder="Min 6 characters" required minlength="6"/>
                        <button type="button" class="pw-toggle" onclick="togglePw('regPassword',this)"><i class="bi bi-eye-fill"></i></button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-full" id="regBtn">
                    <i class="bi bi-person-plus-fill"></i> Create Account
                </button>
            </form>
        </div>
    </div>
</div>

<div id="toast-container"></div>
<script src="js/app.js"></script>
<script>
    // Check if already logged in and handle BFCache
    function handleRedirectIfAuthed() {
        if (localStorage.getItem('mt_user')) {
            document.body.style.display = 'none'; // Instantly hide content
            const u = JSON.parse(localStorage.getItem('mt_user') || '{}');
            window.location.replace(u.role === 'admin' ? 'admin.html' : 'dashboard.html');
        }
    }
    
    // Check immediately
    handleRedirectIfAuthed();
    
    // Check when returning via back button (BFCache)
    window.addEventListener('pageshow', handleRedirectIfAuthed);

    // Check URL hash for register tab
    if (window.location.hash === '#register') switchTab('register');

    function switchTab(tab) {
        document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
        document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
        document.getElementById('loginTab').classList.toggle('active', tab === 'login');
        document.getElementById('registerTab').classList.toggle('active', tab === 'register');
    }

    function togglePw(id, btn) {
        const input = document.getElementById(id);
        input.type = input.type === 'password' ? 'text' : 'password';
        btn.innerHTML = input.type === 'password' ? '<i class="bi bi-eye-fill"></i>' : '<i class="bi bi-eye-slash-fill"></i>';
    }

    async function handleLogin(e) {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        btn.disabled = true; btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Logging in...';
        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ email: document.getElementById('loginEmail').value, password: document.getElementById('loginPassword').value })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error);
            localStorage.setItem('mt_user', JSON.stringify(data.user));
            showToast('Welcome back, ' + data.user.name.split(' ')[0] + '!', 'success');
            document.getElementById('loginForm').reset();
            setTimeout(() => window.location.href = data.user.role === 'admin' ? 'admin.html' : 'dashboard.html', 600);
        } catch (err) {
            showToast(err.message || 'Login failed', 'error');
            btn.disabled = false; btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Login';
        }
    }

    async function handleRegister(e) {
        e.preventDefault();
        const btn = document.getElementById('regBtn');
        btn.disabled = true; btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Creating account...';
        try {
            const res = await fetch('/api/auth/register', {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ name: document.getElementById('regName').value, email: document.getElementById('regEmail').value, password: document.getElementById('regPassword').value })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error);
            localStorage.setItem('mt_user', JSON.stringify(data.user));
            showToast('Account created! Welcome, ' + data.user.name.split(' ')[0] + '!', 'success');
            document.getElementById('registerForm').reset();
            setTimeout(() => window.location.href = 'dashboard.html', 600);
        } catch (err) {
            showToast(err.message || 'Registration failed', 'error');
            btn.disabled = false; btn.innerHTML = '<i class="bi bi-person-plus-fill"></i> Create Account';
        }
    }
</script>
</body>
</html>
