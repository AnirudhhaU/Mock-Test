<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Results — MockTest Pro</title>
    <link rel="stylesheet" href="css/style.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
</head>
<body>
<div class="bg-mesh"></div>

<nav class="navbar">
    <div class="navbar-inner">
        <a href="index.html" class="navbar-brand">
            <div class="brand-logo"><i class="bi bi-mortarboard-fill"></i></div>
            MockTest<span style="color:var(--accent-light)">Pro</span>
        </a>
        <div class="navbar-actions">
            <a href="dashboard.html" class="btn btn-secondary btn-sm"><i class="bi bi-arrow-left"></i> Dashboard</a>
        </div>
    </div>
</nav>

<div class="page page-enter" style="padding:32px 0 80px">
<div class="container" style="max-width:900px">

    <div id="resultsContent"><div class="loader" style="margin-top:60px"></div></div>

</div>
</div>

<div id="toast-container"></div>
<script src="js/app.js"></script>
<script>
requireAuth();

const params = new URLSearchParams(location.search);
const attemptId = params.get('id');
if (!attemptId) window.location.href = 'dashboard.html';

let result = null;

async function loadResult() {
    // Always fetch fresh from API to ensure complete data
    result = await authFetch(`/api/exams/attempt/${attemptId}/result`);
    sessionStorage.removeItem('mt_result'); // clear stale session data
    renderResult(result);
}
loadResult().catch(() => {
    document.getElementById('resultsContent').innerHTML = '<p class="text-red text-center">Could not load results.</p>';
});

function renderResult(r) {
    const pct = parseFloat(r.percentage);
    const passed = pct >= r.pass_marks / r.total_marks * 100;
    const ringColor = pct >= 60 ? 'var(--green)' : pct >= 40 ? 'var(--yellow)' : 'var(--red)';
    const circumference = 2 * Math.PI * 54;
    const offset = circumference - (pct / 100) * circumference;
    const mins = Math.floor((r.time_taken_sec||0)/60);
    const secs = ((r.time_taken_sec||0)%60).toString().padStart(2,'0');

    document.getElementById('resultsContent').innerHTML = `
        <!-- RESULT HERO -->
        <div class="result-hero">
            <div style="font-size:0.85rem;color:var(--text-muted);margin-bottom:6px">${r.category_name || ''}</div>
            <h1 style="font-family:var(--font-display);font-size:1.6rem;font-weight:800;margin-bottom:24px">${r.exam_title}</h1>

            <div class="score-ring-wrap">
                <svg class="progress-ring" width="140" height="140" viewBox="0 0 140 140">
                    <circle class="progress-ring-track" cx="70" cy="70" r="54" stroke-width="10"/>
                    <circle class="progress-ring-fill" cx="70" cy="70" r="54" stroke-width="10"
                        stroke="${ringColor}"
                        stroke-dasharray="${circumference}"
                        stroke-dashoffset="${circumference}"
                        id="ringAnim"/>
                </svg>
                <div class="score-ring-inner">
                    <div class="score-pct" style="color:${ringColor}">${pct.toFixed(1)}%</div>
                    <div class="score-label">${r.score} / ${r.total_marks}</div>
                </div>
            </div>

            <div style="margin:16px 0 24px">
                <span class="badge ${passed?'badge-green':'badge-red'}" style="font-size:1rem;padding:8px 20px">
                    <i class="bi ${passed?'bi-check-circle-fill':'bi-x-circle-fill'}"></i>
                    ${passed ? 'PASSED' : 'FAILED'}
                </span>
            </div>

            <div class="result-stats">
                <div class="result-stat">
                    <div class="result-stat-val text-green">${r.correct_count}</div>
                    <div class="result-stat-lbl">Correct</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-val text-red">${r.wrong_count}</div>
                    <div class="result-stat-lbl">Wrong</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-val text-yellow">${r.skipped_count}</div>
                    <div class="result-stat-lbl">Skipped</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-val text-cyan" id="globalRank">#--</div>
                    <div class="result-stat-lbl">Global Rank</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-val text-accent">${mins}:${secs}</div>
                    <div class="result-stat-lbl">Time Taken</div>
                </div>
            </div>

            <div style="display:flex;gap:12px;justify-content:center;margin-top:24px">
                <a href="dashboard.html" class="btn btn-secondary"><i class="bi bi-grid-fill"></i> Back to Tests</a>
                <button class="btn btn-primary" onclick="loadLeaderboard(${r.exam_id||''})" id="lbBtn">
                    <i class="bi bi-trophy-fill"></i> Leaderboard
                </button>
            </div>
        </div>

        <!-- LEADERBOARD (hidden initially) -->
        <div id="leaderboardSection" class="hidden" style="margin-bottom:32px">
            <h2 style="font-family:var(--font-display);font-size:1.2rem;font-weight:700;margin-bottom:16px;text-align:center">
                <i class="bi bi-trophy-fill text-yellow"></i> Top Scorers
            </h2>
            <div class="table-wrap" id="lbTable"></div>
        </div>

        <!-- ANSWER REVIEW -->
        <div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px">
                <h2 style="font-family:var(--font-display);font-size:1.2rem;font-weight:700">
                    <i class="bi bi-list-check text-accent"></i> Answer Review
                </h2>
                <div style="display:flex;gap:8px;flex-wrap:wrap">
                    <button class="btn btn-sm btn-secondary" onclick="filterAnswers('all')" id="filterAll" style="border-color:var(--accent)">All</button>
                    <button class="btn btn-sm btn-secondary" onclick="filterAnswers('correct')">Correct</button>
                    <button class="btn btn-sm btn-secondary" onclick="filterAnswers('wrong')">Wrong</button>
                    <button class="btn btn-sm btn-secondary" onclick="filterAnswers('skipped')">Skipped</button>
                </div>
            </div>
            <div id="answersContainer">
                ${(r.answers||[]).map((a,i) => {
                    const state = !a.selected_option ? 'skipped' : a.is_correct ? 'correct' : 'wrong';
                    const stateIcon = state==='correct'?'<i class="bi bi-check-circle-fill text-green"></i>':state==='wrong'?'<i class="bi bi-x-circle-fill text-red"></i>':'<i class="bi bi-dash-circle text-yellow"></i>';
                    const opts = ['A','B','C','D'];
                    const optTexts = [a.option_a, a.option_b, a.option_c, a.option_d];
                    return `
                    <div class="answer-item ${state}" data-state="${state}">
                        <div class="answer-header">
                            <div style="font-weight:600;font-size:0.95rem;line-height:1.5;flex:1">
                                <span style="color:var(--text-muted);font-size:0.8rem;font-weight:500">Q${i+1}. </span>${a.question_text}
                            </div>
                            <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
                                <span class="badge ${{'easy':'diff-easy','medium':'diff-medium','hard':'diff-hard'}[a.difficulty]||''}">${a.difficulty}</span>
                                ${stateIcon}
                            </div>
                        </div>
                        <div class="answer-options">
                            ${opts.map((o,j) => {
                                let cls = '';
                                if (o === a.selected_option && !a.is_correct) cls = 'your-answer';
                                if (o === a.correct_option) cls = 'correct-ans';
                                return `<div class="answer-option ${cls}">
                                    <span style="font-weight:700;margin-right:6px">${o}.</span>${optTexts[j]}
                                    ${o===a.selected_option&&!a.is_correct?' <span style="color:var(--red);font-size:0.75rem">(Your answer)</span>':''}
                                    ${o===a.correct_option?' <span style="color:var(--green);font-size:0.75rem">(Correct)</span>':''}
                                </div>`;
                            }).join('')}
                        </div>
                        ${a.explanation ? `<div class="explanation"><i class="bi bi-lightbulb-fill text-yellow"></i> ${a.explanation}</div>` : ''}
                        <div style="margin-top:8px;font-size:0.78rem;color:var(--text-muted)">
                            Marks: <strong style="color:${a.marks_awarded>0?'var(--green)':a.marks_awarded<0?'var(--red)':'var(--text-muted)'}">${a.marks_awarded>0?'+':''}${a.marks_awarded}</strong>
                        </div>
                    </div>`;
                }).join('')}
            </div>
        </div>`;

    // Animate ring
    setTimeout(() => {
        const ring = document.getElementById('ringAnim');
        if (ring) ring.style.strokeDashoffset = offset;
    }, 100);

    // Fetch Global Rank (Window Function demonstration)
    authFetch(`/api/exams/attempt/${r.id}/global-rank`)
        .then(rank => {
            const el = document.getElementById('globalRank');
            if(rank && rank.pos) el.textContent = `#${rank.pos} / ${rank.total}`;
        }).catch(err => console.error('Rank error:', err));
}

function filterAnswers(type) {
    document.querySelectorAll('.answer-item').forEach(el => {
        el.style.display = (type === 'all' || el.dataset.state === type) ? '' : 'none';
    });
    document.querySelectorAll('#answersContainer ~ div button, .btn-sm').forEach(b => b.style.borderColor='');
}

async function loadLeaderboard(examId) {
    const btn = document.getElementById('lbBtn');
    const sec = document.getElementById('leaderboardSection');
    if (!sec.classList.contains('hidden')) { sec.classList.add('hidden'); return; }
    btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Loading...';
    try {
        const lb = await fetch(`/api/exams/${examId}/leaderboard`).then(r=>r.json());
        const rankIcons = ['🥇','🥈','🥉'];
        document.getElementById('lbTable').innerHTML = `
            <table>
                <thead><tr><th>Rank</th><th>Name</th><th>Best Score</th><th>Best %</th><th>Attempts</th></tr></thead>
                <tbody>
                ${lb.map((row,i) => `
                    <tr>
                        <td class="rank ${i<3?'rank-'+(i+1):''}">${rankIcons[i]||'#'+(i+1)}</td>
                        <td style="font-weight:600">${row.name}</td>
                        <td>${row.best_score}</td>
                        <td><strong>${parseFloat(row.best_percentage).toFixed(1)}%</strong></td>
                        <td>${row.attempts}</td>
                    </tr>`).join('')}
                </tbody>
            </table>`;
        sec.classList.remove('hidden');
    } catch(e) { showToast('Could not load leaderboard','error'); }
    btn.innerHTML = '<i class="bi bi-trophy-fill"></i> Leaderboard';
}
</script>
</body>
</html>
